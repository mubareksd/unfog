name: Release Android

concurrency:
  group: release-android-${{ github.event.release.tag_name }}
  cancel-in-progress: true

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.0"
  FLAVOR: production
  TARGET: lib/main/main_production.dart

jobs:
  build-and-upload:
    name: Build and upload Android APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build universal release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor "${{ env.FLAVOR }}" \
            --target "${{ env.TARGET }}"

      - name: Build split-per-ABI release APKs
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --flavor "${{ env.FLAVOR }}" \
            --target "${{ env.TARGET }}" \
            --split-per-abi

      - name: Prepare release artifacts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          output_dir="build/app/outputs/flutter-apk"
          mkdir -p release-artifacts

          cp "$output_dir/app-${{ env.FLAVOR }}-release.apk" \
            "release-artifacts/unfog-universal-${RELEASE_TAG}.apk"

          for apk in "$output_dir"/app-*-${{ env.FLAVOR }}-release.apk; do
            [ -f "$apk" ] || continue
            abi="$(basename "$apk" | sed -E "s/app-(.*)-${{ env.FLAVOR }}-release\.apk/\1/")"
            cp "$apk" "release-artifacts/unfog-${abi}-${RELEASE_TAG}.apk"
          done

          ls -lh release-artifacts/

      - name: Upload APKs to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
